name: sc2_flow
description: 星程
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  file_picker: ^10.3.10
  url_launcher: ^6.2.2
  flutter_tts: ^3.8.5
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: SourceHanSansSC
      fonts:
        - asset: fonts/SourceHanSansSC/OTF/SimplifiedChinese/SourceHanSansSC-Regular.otf
        - asset: fonts/SourceHanSansSC/OTF/SimplifiedChinese/SourceHanSansSC-Bold.otf
          weight: 700
        - asset: fonts/SourceHanSansSC/OTF/SimplifiedChinese/SourceHanSansSC-Light.otf
          weight: 300
